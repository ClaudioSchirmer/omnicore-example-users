service: omnicore-example-users

http:
  addr: "${HTTP_ADDR::8080}"
  requestTimeoutSeconds: 30   # inbound request deadline; unset would also default to 30, 0 disables

relational:
  dialect: "${REL_DIALECT:postgres}"
  dsn: "${DATABASE_URL:postgres://omnicore:omnicore@localhost:5433/users_db?sslmode=disable}"

mongo:
  uri: "${MONGO_URI:mongodb://localhost:27018}"
  database: "${MONGO_DB:users_views}"
  # Mongo schema evolution — drift between the declared ViewDefinition and the
  # materialized collection state is detected at boot via the omnicore_mongo_views
  # registry row carrying the spec hash. autoRun governs whether the framework
  # rebuilds automatically when drift is found (dev=true / non-dev=check is
  # the profile-aware default; declared explicitly here to make the showcase
  # self-documenting). allowDowngrade is the opt-in for code version < registry
  # version (canary / blue-green rollback flow); default false.
  rebuild:
    autoRun: true            # dev default; sandbox iteration without boot abort
    allowDowngrade: false    # default; opt-in for canary / blue-green rollback

kafka:
  brokers:
    - "${KAFKA_BROKERS:localhost:9094}"
  syncGroupId: "${SYNC_GROUP_ID:omnicore-example-users-sync}"

migrations:
  dir: "${MIGRATIONS_DIR:./migrations/postgres}"
  autoRun: true

# Read-side `?limit=` ceiling — applies uniformly to every paged GET that does
# not opt into a per-view override via `fwinfra.View("...").MaxLimit(N)`.
# Framework fallback when neither is declared is 100; declared explicitly here
# so the dev profile matches the production-grade posture and the value is
# discoverable in the yaml diff.
query:
  maxLimit: 100
  maxExportRows: 5000   # ceiling on rows a CSV/Excel export streams (GET /users.csv)

openapi:
  uiPath: /docs           # default; change to e.g. /swagger or /admin/docs
  rootRedirect: true      # opt-in; GET / → 302 uiPath

# Authentication is disabled in the dev profile so the example can run without
# a local IdP. The framework rejects this combination under APP_PROFILE=prd, so
# a real deployment must set auth.mode=jwt (and configure jwksUrl / publicKeyPem
# + issuer + audience) in microservice.prd.yaml before promoting.
auth:
  mode: disabled
  # auditClaims is the JWT-claim allowlist surfaced on the AuditEvent's
  # actorClaims block. Empty (the dev default) keeps the block omitted entirely.
  # Production profiles typically declare [tenant_id, roles, preferred_username]
  # so audit forensics can reconstruct "who did what under which scope".
  auditClaims: []

# Audit routing — declared explicitly here so the dev profile carries every key
# the framework recognizes (no hidden defaults). The framework writes one
# AuditEvent per successful write (granularity B: the aggregate is the event
# unit, identical to the outbox row). `destinations` controls where it lands:
#
#   - `database` → INSERT into audit_events INSIDE the same pgx.Tx as the data
#                  row + outbox row. Atomic by construction: if COMMIT succeeds,
#                  the audit row exists. Source of truth for compliance and
#                  forensics; queryable via SQL with the indexes on entity_type,
#                  actor, tenant_id, thread_id, created_at (BRIN).
#   - `slog`     → flat top-level slog line emitted AFTER COMMIT. Read-side
#                  echo for observability (ELK / Loki / stdout collector);
#                  lossy if the shipper drops events, but the PG row stays
#                  the authority.
#
# Both active is the framework default and the recommended posture — the PG
# row guarantees durability and ELK keeps the cross-service consolidation
# pattern the team already runs. Empty list (`destinations: []`) disables
# audit entirely; the audit_events table still exists but no row is written.
audit:
  destinations:
    - slog
    - database

# Distributed tracing (OpenTelemetry) — opt-in; default off installs the no-op
# tracer. Enabled here in the dev sandbox with exporter=otlp shipping spans to the
# Jaeger container in devops/docker-compose.yml. Open http://localhost:16686, pick
# service "omnicore-example-users", and SEE the trace tree (server -> dispatch ->
# pgx/mongo/httpclient) in the UI — the eyeball view, not stdout. always_on samples
# every request so nothing is dropped while exploring; export is async + batched and
# off the request path, so Jaeger being down never blocks a request (spans drop).
# Drop pgx/mongo from `instrument` if the per-query span volume gets noisy. For a
# quick terminal-only look without Jaeger, switch exporter to `stdout` (debug-only —
# it interleaves spans with the logs + audit echo on the same stream).
observability:
  tracing:
    enabled: true
    exporter: otlp                                              # ship to Jaeger
    endpoint: "${OTEL_EXPORTER_OTLP_ENDPOINT:localhost:4317}"   # Jaeger OTLP/gRPC
    sampler: always_on                                          # dev: see every trace
    instrument: [http, pgx, mongo, kafka, httpclient]           # empty list = all

# GraphQL — its own web surface (POST /graphql), separate from REST/OpenAPI:
# never in the Swagger document, not policed by the REST route scans. The
# schema + attached handlers live in code (Wiring.GraphQL = NewGraphQL(d)); only
# these serving knobs are config. Playground + introspection are ON here for the
# dev sandbox (GraphiQL at /graphql/ui); a prd profile would leave both off.
graphql:
  path: /graphql
  uiPath: /graphql/ui
  playground: true
  introspection: true
  rootRedirect: false     # GET / → 302 path; mutually exclusive with openapi.rootRedirect (both true → boot panic)

# Outbound HTTP — exercises the omnicore/infra/httpclient subsystem
# end-to-end against the local Keycloak fixture. Two services declared:
# `keycloak-public` hits the OIDC discovery endpoint (anonymous, cacheable);
# `keycloak-admin` hits the admin REST API (oauth2-client-credentials).
httpClient:
  defaults:
    timeout: 10s
    headers:
      User-Agent: "omnicore-example-users/1.0"
    cache:
      enabled: true
      defaultTTL: 5m
      # Keycloak's discovery and admin endpoints emit Cache-Control: no-store,
      # which the framework honors by default — preventing the cache from
      # storing. For this showcase we disable that hint so the YAML TTLs
      # govern eviction; in production, leave this on and trust the upstream.
      honorCacheControl: false
    # QA-only: the circuit breaker is a defaults-level knob (config shared, state
    # per (service,endpoint) pair). Exercised by the qa-echo/always500 endpoint —
    # opens after 3 consecutive failures; the existing keycloak/echo pairs are
    # untouched (their per-pair breakers stay closed).
    circuitBreaker:
      failureThreshold: 3
      openFor: 5s

  services:
    keycloak-public:
      baseURL: "${KC_URL:http://localhost:8088}"
      endpoints:
        getRealmInfo:
          method: GET
          path: /realms/omnicore-test/.well-known/openid-configuration
          cache: { ttl: 5m }

    keycloak-admin:
      baseURL: "${KC_URL:http://localhost:8088}"
      auth: { provider: kc-admin }
      endpoints:
        getUser:
          method: GET
          path: /admin/realms/omnicore-test/users/{id}
          acceptableStatus: [404]
          cache:
            ttl: 1m
            varyOn: [header:Accept-Language]

    keycloak-tenant:
      baseURL: "${KC_URL:http://localhost:8088}"
      auth: { provider: kc-password-tenant }
      endpoints:
        whoami:
          method: GET
          path: /realms/omnicore-test/protocol/openid-connect/userinfo

    # `echo` and `echo-signed` point at the example service itself — the
    # producer side lives in web/echo_routes.go (the /echo/* group). They
    # showcase the streaming surfaces (Phase 7) plus HMAC signing (Phase 6)
    # without requiring an extra container in docker-compose.
    #
    # Two services because signing is per-service and rejects streaming
    # uploads at call time (the body cannot be hashed without buffering).
    # `echo` carries the streaming endpoints; `echo-signed` carries the
    # non-streaming JSON endpoint that exercises HMAC.
    echo:
      baseURL: "${ECHO_URL:http://localhost:8080}"
      endpoints:
        download:
          method: GET
          path: /echo/stream/{size}
          responseStream: true
        uploadStream:
          method: POST
          path: /echo/upload
        multipart:
          method: POST
          path: /echo/multipart
        sse:
          method: GET
          path: /echo/sse
          responseSSE: true

    echo-signed:
      baseURL: "${ECHO_URL:http://localhost:8080}"
      signing:
        type: hmac-sha256
        keyId: "${ECHO_KEY_ID:demo-key-1}"
        keyIdHeader: X-Key-Id
        secret: "${ECHO_SIGNING_SECRET:demo-secret-please-change}"
        signedHeaders:
          - host
          - x-date
          - x-content-sha256
        timestampHeader: X-Date
        timestampFormat: rfc1123
        signatureHeader: X-Signature
      endpoints:
        signed:
          method: POST
          path: /echo/signed

    # QA-only httpclient-advanced showcase — the service self-calls the qa echo
    # upstream (/qa/echo/*) to exercise retry, breaker, idempotency, and the XML
    # request codec. ECHO_URL points back at this same server (localhost:8080).
    qa-echo:
      baseURL: "${ECHO_URL:http://localhost:8080}"
      endpoints:
        flaky:
          method: GET
          path: /qa/echo/flaky
          retry:
            retryOn: [503]
            maxAttempts: 3
        always500:
          method: GET
          path: /qa/echo/always500
        idempotency:
          method: POST
          path: /qa/echo/idempotency
          idempotency:
            header: X-Idempotency-Key
            source: ctx
        xml:
          method: POST
          path: /qa/echo/xml
          requestCodec: xml
    # A second service carrying a static bearer auth provider + a YAML header
    # cascade (X-Api-Key), to exercise the auth-provider + WithExtraHeader paths.
    qa-echo-auth:
      baseURL: "${ECHO_URL:http://localhost:8080}"
      auth: { provider: qa-static-bearer }
      headers:
        X-Api-Key: "qa-static-api-key"
      endpoints:
        headers:
          method: GET
          path: /qa/echo/headers

  authProviders:
    qa-static-bearer:
      type: bearer-static
      token: "qa-demo-bearer-token"
    kc-admin:
      type: oauth2-client-credentials
      tokenEndpoint: "${KC_URL:http://localhost:8088}/realms/omnicore-test/protocol/openid-connect/token"
      clientId: "${KC_ADMIN_CLIENT_ID:omnicore-users-client}"
      clientSecret: "${KC_ADMIN_CLIENT_SECRET:test-secret-please-change}"
      tokenCache:
        source: response-field
        jsonPath: $.expires_in
        unit: seconds
        skew: 30s
      revocationOnUnauthorized: true

    kc-password-tenant:
      type: credentials-exchange
      tokenEndpoint: "${KC_URL:http://localhost:8088}/realms/omnicore-test/protocol/openid-connect/token"
      requestCodec: form-urlencoded
      requestFields:
        grant_type: password
        client_id: "${KC_TENANT_CLIENT_ID:omnicore-users-client}"
        client_secret: "${KC_TENANT_CLIENT_SECRET:test-secret-please-change}"
        scope: openid
      requestFieldsFromCtx:
        username: tenant.username
        password: tenant.password
      responseTokenPath: $.access_token
      tokenCache:
        source: response-field
        jsonPath: $.expires_in
        unit: seconds
        skew: 30s

# Cross-service integration events — declared here so a future round adds
# publishers / subscribers without touching the YAML grammar. The defaults
# block seeds the consumer-group naming and worker count across any
# integration.subscribes entry that omits its own override. The service
# currently emits nothing AND consumes nothing, so the cost is purely
# structural — fwintegration.Configure(cfg.Integration, ...) ignores the
# empty publishes / subscribes maps without spinning a single goroutine.
integration:
  defaults:
    consumerGroup: "${INTEGRATION_GROUP_ID:omnicore-example-users-integration}"
    workers: 4
    startFrom: latest
  # QA-only (microservice.qa.yaml): the Gadget insert BeforeCommit hook
  # dispatches GadgetCreated into integration_events; a qa Debezium connector
  # relays it to the fixed topic qa.integration.events, and the service
  # self-subscribes, recording each event into gadget_events_sink. Absent from
  # the canonical dev.yaml so the canonical binary spins no consumer.
  publishes:
    events:
      gadgetCreated:
        eventType: GadgetCreated
        aggregate: Gadget
  subscribes:
    self_gadgets:
      # Backend-specific topic: postgres and mysql share the same Kafka broker,
      # so a fixed topic would let the mysql consumer replay postgres-produced
      # events (and vice versa). The qa Debezium connector routes each engine's
      # integration_events into its own topic; qa/_backend.sh sets the matching
      # QA_INTEGRATION_TOPIC before boot.
      topic: "${QA_INTEGRATION_TOPIC:qa.integration.events}"
      events:
        gadgetCreated:
          eventType: GadgetCreated

# Coordinated drain budget on SIGINT/SIGTERM. The framework runs HTTP
# server, integration consumer pool, and upstream subscribers' drains in
# parallel under the shared shutdown context capped at this value. 30s
# matches the canonical kubernetes terminationGracePeriodSeconds so the
# pod-evicted drain completes inside the orchestrator's window.
shutdown:
  drainTimeoutSeconds: 30

# QA-only upstream composition — the service subscribes to its OWN gadgets CDC
# topic (gadgets.events) and materializes a filtered local projection into the
# Mongo collection upstream_gadgets (event-driven; B never reads A on the
# request path). Single service as both producer and upstream consumer.
upstreamSubscriptions:
  - topic: gadgets.events
    collection: upstream_gadgets
    consumerGroup: omnicore-example-users-upstream-gadgets
    workers: 1
    filter: [id, code, name]
    startFrom: earliest
    onUpstreamDelete: cascade
  # QA-only shared-base embed showcase — the service subscribes to its OWN
  # qa_items CDC topic (qa_items.events, routed by the outbox EventRouter on
  # aggregate_type=qa_items) and materializes a filtered `upstream_items`
  # projection. That collection is the EXTERNAL source the `qa_accounts_view`
  # SharedBaseView embeds both 1:1 (Embed "featuredItem") and 1:N (EmbedMany
  # "items") — proving external embeds compose on a shared-base root end to end.
  - topic: qa_items.events
    collection: upstream_items
    consumerGroup: omnicore-example-users-upstream-items
    workers: 1
    filter: [id, account_id, catalog_id, label]
    startFrom: earliest
    onUpstreamDelete: cascade
