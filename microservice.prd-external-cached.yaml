service: omnicore-example-users

http:
  addr: "${HTTP_ADDR::8080}"

grpc:
  addr: "${GRPC_ADDR::9090}"

relational:
  dialect: "${REL_DIALECT:postgres}"
  dsn: "${DATABASE_URL:postgres://omnicore:omnicore@localhost:5433/users_db?sslmode=disable}"

mongo:
  uri: "${MONGO_URI:mongodb://localhost:27018}"
  database: "${MONGO_DB:users_views}"
  rebuild:
    autoRun: true     # sandbox posture; QA boots under prd-external-cached without strict-mode abort

transport:
  endpoints:
    - "${TRANSPORT_ENDPOINTS:localhost:4222}"
  syncGroup: "${SYNC_GROUP_ID:omnicore-example-users-sync}"

migrations:
  dir: "${MIGRATIONS_DIR:./migrations/postgres}"
  autoRun: true

# Variant profile exercising the framework's external validator with the
# positive-only cache enabled (TTL=30s). Tokens already validated as active
# bypass the IdP for up to TTL seconds; revocation at the IdP is honored only
# after the TTL elapses. Use this profile when IdP cost dominates and a small
# revocation window is acceptable. Negative answers and transport errors are
# never cached so a revocation observed by the framework reaches every replica
# on the next miss.
auth:
  mode: jwt
  jwt:
    algorithms: [RS256]
    issuer: "${JWT_ISSUER:http://localhost:8088/realms/omnicore-test}"
    audience: "${JWT_AUDIENCE:omnicore-users-api}"
    leewaySeconds: 5
    jwksUrl: "${JWT_JWKS_URL:http://localhost:8088/realms/omnicore-test/protocol/openid-connect/certs}"
  externalValidator:
    method: POST
    url: "${JWT_INTROSPECT_URL:http://localhost:8088/realms/omnicore-test/protocol/openid-connect/token/introspect}"
    tokenPlacement: form_field
    tokenField: token
    extraHeaders:
      Authorization: "Basic ${OMNICORE_CLIENT_BASIC:b21uaWNvcmUtdXNlcnMtY2xpZW50OnRlc3Qtc2VjcmV0LXBsZWFzZS1jaGFuZ2U=}"
    success:
      jsonPath: $.active
      expectedValue: true
    timeoutMs: 2000
    failMode: closed
    cacheTtlSeconds: 30
  publicRoutes:
    - GET /health
  auditClaims:
    - preferred_username
    - email

# Audit destinations — both active (framework default; explicit here so the
# yaml carries no hidden assumptions about audit routing).
audit:
  destinations:
    - slog
    - database

# Cross-service integration events — defaults seeded; producer / subscriber
# entries land here when the service starts emitting or consuming events.
integration:
  defaults:
    consumerGroup: "${INTEGRATION_GROUP_ID:omnicore-example-users-integration}"
    workers: 4
    startFrom: latest

# Coordinated drain on SIGINT/SIGTERM (matches kubernetes
# terminationGracePeriodSeconds default).
shutdown:
  drainTimeoutSeconds: 30
