# Debezium Server — Oracle → NATS JetStream (lane D). Same shape as
# conf-mysql-nats (ONE server instance tails BOTH outbox tables through two
# predicate-gated EventRouters; framework-owned stream) but an OracleConnector
# over LogMiner, with every lesson of the Kafka-relay round baked in:
#   * lob.enabled — the CDC-tailed payloads are CLOB (LogMiner cannot decode
#     native-JSON/OSON redo; see the framework's Oracle column-shapes table);
#   * skip.unparseable.ddl + store.only.captured.tables.ddl — the DDL parser
#     dies on 23ai syntax from OTHER tables (CREATE TABLE IF NOT EXISTS from
#     the qa fixtures) without them;
#   * heartbeat.action.query — LogMiner holds the LAST event of a burst until
#     new redo advances the SCN; the periodic UPDATE keeps it moving
#     (debezium_heartbeat is seeded by devops/oracle/init/02_cdc.sh);
#   * tight mining cadence — the write→doc floor is ~2-3s; default sleeps
#     would push it further;
#   * column names arrive UPPERCASE from the Oracle catalog, so the
#     EventRouter field names are UPPERCASE with lowercase HEADER aliases
#     (the cross-lane wire contract stays identical).
# This lane runs on its OWN NATS (nats-oracle): subject names are the
# cross-service contract (omnicore.<table>.events, no suffix knob by design),
# so sharing lane B's JetStream would cross the lanes' event streams.

# --- sink: NATS JetStream (lane D's own server) ---
debezium.sink.type=nats-jetstream
debezium.sink.nats-jetstream.url=nats://nats-oracle:4222
debezium.sink.nats-jetstream.create-stream=false

# --- formats ---
debezium.format.value=simplestring
debezium.format.key=json
debezium.format.header=json
debezium.format.value.schemas.enable=false
debezium.format.header.schemas.enable=false

# --- source: one Oracle connector, BOTH outbox tables, streaming only ---
debezium.source.connector.class=io.debezium.connector.oracle.OracleConnector
debezium.source.offset.storage.file.filename=/debezium/data/offsets-oracle.dat
debezium.source.offset.flush.interval.ms=1000
debezium.source.schema.history.internal=io.debezium.storage.file.history.FileSchemaHistory
debezium.source.schema.history.internal.file.filename=/debezium/data/schema-history-oracle.dat
debezium.source.database.hostname=oracle
debezium.source.database.port=1521
debezium.source.database.user=c##dbzuser
debezium.source.database.password=OmnicoreQA!2026
debezium.source.database.dbname=FREE
debezium.source.database.pdb.name=FREEPDB1
debezium.source.topic.prefix=omnicore_users_oracle
debezium.source.table.include.list=OMNICORE.OUTBOX,OMNICORE.INTEGRATION_EVENTS
debezium.source.schema.history.internal.skip.unparseable.ddl=true
debezium.source.schema.history.internal.store.only.captured.tables.ddl=true
debezium.source.tombstones.on.delete=false
debezium.source.snapshot.mode=no_data
debezium.source.poll.interval.ms=100
debezium.source.include.schema.changes=false
debezium.source.lob.enabled=true
debezium.source.log.mining.strategy=online_catalog
debezium.source.log.mining.sleep.time.default.ms=100
debezium.source.log.mining.sleep.time.max.ms=300
debezium.source.log.mining.sleep.time.increment.ms=100
# NOTE: the heartbeat records are PUBLISHED too (__debezium-heartbeat.<prefix>);
# register-connector.sh pre-creates the DEBEZIUM_HEARTBEAT stream covering that
# subject — with create-stream=false an uncovered publish 503s and kills the
# connector.
debezium.source.heartbeat.interval.ms=1000
debezium.source.heartbeat.action.query=UPDATE debezium_heartbeat SET ts = SYSTIMESTAMP WHERE id = 1

# --- two EventRouters, each gated by a predicate on its source table ---
debezium.transforms=outboxRoute,integrationRoute

# OUTBOX -> omnicore.<aggregate_type>.events (field names UPPERCASE — the
# Oracle catalog form — with lowercase header aliases for wire parity)
debezium.transforms.outboxRoute.type=io.debezium.transforms.outbox.EventRouter
debezium.transforms.outboxRoute.predicate=isOutbox
debezium.transforms.outboxRoute.table.field.event.id=ID
debezium.transforms.outboxRoute.table.field.event.key=AGGREGATE_ID
debezium.transforms.outboxRoute.table.field.event.type=EVENT_TYPE
debezium.transforms.outboxRoute.table.field.event.payload=PAYLOAD
debezium.transforms.outboxRoute.route.by.field=AGGREGATE_TYPE
debezium.transforms.outboxRoute.route.topic.replacement=omnicore.$${routedByValue}.events
debezium.transforms.outboxRoute.table.fields.additional.placement=AGGREGATE_TYPE:header:aggregate_type,EVENT_TYPE:header:event_type,TRACEPARENT:header:traceparent,AGGREGATE_ID:header:aggregate_id
debezium.transforms.outboxRoute.table.expand.json.payload=false

# INTEGRATION_EVENTS -> omnicore.qa.integration.events.oracle (fixed, .oracle
# suffix so a persisted stream never mixes engines' integration events)
debezium.transforms.integrationRoute.type=io.debezium.transforms.outbox.EventRouter
debezium.transforms.integrationRoute.predicate=isIntegration
debezium.transforms.integrationRoute.table.field.event.id=EVENT_ID
debezium.transforms.integrationRoute.table.field.event.key=AGGREGATE_ID
debezium.transforms.integrationRoute.table.field.event.type=EVENT_TYPE
debezium.transforms.integrationRoute.table.field.event.payload=PAYLOAD
debezium.transforms.integrationRoute.route.by.field=EVENT_TYPE
debezium.transforms.integrationRoute.route.topic.replacement=omnicore.qa.integration.events.oracle
debezium.transforms.integrationRoute.table.fields.additional.placement=AGGREGATE_TYPE:header:aggregate_type,EVENT_TYPE:header:event_type,TRACEPARENT:header:traceparent,AGGREGATE_ID:header:aggregate_id
debezium.transforms.integrationRoute.table.expand.json.payload=false

# --- predicates: match each table by its default (pre-reroute) topic name ---
debezium.predicates=isOutbox,isIntegration
debezium.predicates.isOutbox.type=org.apache.kafka.connect.transforms.predicates.TopicNameMatches
debezium.predicates.isOutbox.pattern=.*\\.OMNICORE\\.OUTBOX
debezium.predicates.isIntegration.type=org.apache.kafka.connect.transforms.predicates.TopicNameMatches
debezium.predicates.isIntegration.pattern=.*\\.OMNICORE\\.INTEGRATION_EVENTS
