# Debezium Server — MySQL → NATS JetStream. Same shape as conf-postgres (two
# predicate-gated EventRouters, framework-owned stream) but a MySqlConnector with
# a file-backed schema history, and the integration subject carries the .mysql
# suffix so a persisted stream never mixes engines' integration events.

# --- sink: NATS JetStream ---
debezium.sink.type=nats-jetstream
debezium.sink.nats-jetstream.url=nats://nats:4222
debezium.sink.nats-jetstream.create-stream=false

# --- formats ---
debezium.format.value=json
debezium.format.key=json
debezium.format.header=json
debezium.format.value.schemas.enable=false
debezium.format.header.schemas.enable=false

# --- source: one MySQL connector, BOTH outbox tables, streaming only ---
debezium.source.connector.class=io.debezium.connector.mysql.MySqlConnector
debezium.source.offset.storage.file.filename=/debezium/data/offsets-mysql.dat
debezium.source.offset.flush.interval.ms=1000
debezium.source.schema.history.internal=io.debezium.storage.file.history.FileSchemaHistory
debezium.source.schema.history.internal.file.filename=/debezium/data/schema-history-mysql.dat
debezium.source.database.hostname=mysql
debezium.source.database.port=3306
debezium.source.database.user=root
debezium.source.database.password=root
debezium.source.database.include.list=users_db
debezium.source.database.server.id=184054
debezium.source.topic.prefix=omnicore_users_mysql
debezium.source.table.include.list=users_db.outbox,users_db.integration_events
debezium.source.tombstones.on.delete=false
debezium.source.snapshot.mode=no_data
# Poll every 100ms (matches the former Kafka Connect connector; default 500ms).
debezium.source.poll.interval.ms=100
# MySQL emits schema-change events to a topic named after the prefix
# (omnicore_users_mysql) by default — that subject is outside omnicore.> and has
# no stream, so a JetStream publish of it fails with "No Responders" and kills
# the relay. Disable them: only the outbox/integration rows (both rerouted under
# omnicore.*) must reach the sink.
debezium.source.include.schema.changes=false

# --- two EventRouters, each gated by a predicate on its source table ---
debezium.transforms=outboxRoute,integrationRoute

# outbox -> omnicore.<aggregate_type>.events
debezium.transforms.outboxRoute.type=io.debezium.transforms.outbox.EventRouter
debezium.transforms.outboxRoute.predicate=isOutbox
debezium.transforms.outboxRoute.table.field.event.id=id
debezium.transforms.outboxRoute.table.field.event.key=aggregate_id
debezium.transforms.outboxRoute.table.field.event.type=event_type
debezium.transforms.outboxRoute.table.field.event.payload=payload
debezium.transforms.outboxRoute.route.by.field=aggregate_type
debezium.transforms.outboxRoute.route.topic.replacement=omnicore.$${routedByValue}.events
debezium.transforms.outboxRoute.table.fields.additional.placement=aggregate_type:header,event_type:header,traceparent:header:traceparent,aggregate_id:header
debezium.transforms.outboxRoute.table.expand.json.payload=true

# integration_events -> omnicore.qa.integration.events.mysql (fixed, .mysql suffix)
debezium.transforms.integrationRoute.type=io.debezium.transforms.outbox.EventRouter
debezium.transforms.integrationRoute.predicate=isIntegration
debezium.transforms.integrationRoute.table.field.event.id=event_id
debezium.transforms.integrationRoute.table.field.event.key=aggregate_id
debezium.transforms.integrationRoute.table.field.event.type=event_type
debezium.transforms.integrationRoute.table.field.event.payload=payload
debezium.transforms.integrationRoute.route.by.field=event_type
debezium.transforms.integrationRoute.route.topic.replacement=omnicore.qa.integration.events.mysql
debezium.transforms.integrationRoute.table.fields.additional.placement=aggregate_type:header,event_type:header,traceparent:header:traceparent,aggregate_id:header
debezium.transforms.integrationRoute.table.expand.json.payload=true

# --- predicates: match each table by its default (pre-reroute) topic name ---
debezium.predicates=isOutbox,isIntegration
debezium.predicates.isOutbox.type=org.apache.kafka.connect.transforms.predicates.TopicNameMatches
debezium.predicates.isOutbox.pattern=.*\\.users_db\\.outbox
debezium.predicates.isIntegration.type=org.apache.kafka.connect.transforms.predicates.TopicNameMatches
debezium.predicates.isIntegration.pattern=.*\\.users_db\\.integration_events
