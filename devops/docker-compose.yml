# QA bench — the automated test bench for qa/run.sh, running the TWO transport
# lanes in parallel so every framework leg is exercised each run:
#   • Lane A — Postgres + Kafka + Mongo, relay = Debezium CONNECT → Kafka
#   • Lane B — MySQL   + NATS  + Mongo, relay = Debezium SERVER  → NATS
# Both lanes share one Mongo (distinct DBs), Keycloak, Redis, Jaeger and the ELK
# stack. This is the "messy" bench the QA suites own and reset at will; the
# separate docker-compose.dev.yml (project omnicore-dev) is the developer's
# exclusive env and is NEVER touched here.
#
# Shared infra host ports are SHIFTED off the dev-bench defaults so both benches
# can run at once: mysql :3317, mongo :27028, nats :4232. Lane-only infra keeps
# its usual ports (pg :5433, kafka :9094, keycloak :8088, redis :6380,
# jaeger :16686) since the dev bench has none of them.
name: omnicore-qa

services:
  # ── Lane A relational — Postgres (wal_level=logical for Debezium pgoutput) ──
  postgres:
    image: postgres:16-alpine
    container_name: omnicore-qa-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: omnicore
      POSTGRES_PASSWORD: omnicore
      POSTGRES_DB: users_db
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnicore -d users_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Lane B relational — MySQL (binlog defaults on 8.4 satisfy Debezium) ─────
  # ── Lane C relational — SQL Server 2022, under the `sqlserver` compose
  # profile so `up -d` without the profile changes nothing for lanes A/B.
  # Local by default; the lane can instead point at a REMOTE docker engine via
  # QA_SQLSERVER_CONTEXT/QA_SQLSERVER_DB_HOST (see qa/_backend.sh) — the same
  # yaml serves both (compose is evaluated client-side). Agent is enabled
  # because Debezium's SQL Server connector (phase-5 relay) requires it. The
  # image is amd64-only: Apple-Silicon hosts run it via Rosetta.
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: omnicore-qa-sqlserver
    # The image is amd64-only; the explicit platform lets an Apple-Silicon
    # docker pull and run it via Rosetta instead of failing the manifest match.
    platform: linux/amd64
    profiles: ["sqlserver"]
    ports:
      - "14333:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "OmnicoreQA!2026"
      MSSQL_AGENT_ENABLED: "true"
      MSSQL_PID: "Developer"
      # Bound SQL Server's own memory. Without it the engine sizes itself
      # against the WHOLE Docker VM and, under the full multi-lane bench, the
      # VM OOM-killer takes the container (Exited 137) — the Keycloak rationale.
      # 1 GB buffer pool is plenty for the QA workload; the generous gap to
      # mem_limit is NOT slack — MSSQL_MEMORY_LIMIT_MB caps only the engine's
      # memory manager, while worker-thread stacks, query grants and the
      # Rosetta x64 translation live OUTSIDE it (a 512MB gap OOM-killed the
      # container mid-e2e under lane parallelism). mem_limit still makes any
      # breach deterministic (this container dies, not a random neighbor).
      MSSQL_MEMORY_LIMIT_MB: "1024"
    mem_limit: 3g
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'OmnicoreQA!2026' -Q 'SELECT 1' -h -1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # Lane C Redis (same rationale as redis/redis-mysql: per-lane broker so
  # cache.sh can stop/start its own without disturbing the parallel lanes).
  redis-sqlserver:
    image: redis:7-alpine
    container_name: omnicore-qa-redis-sqlserver
    profiles: ["sqlserver"]
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Lane C transport — a DEDICATED Kafka + Connect pair under the `sqlserver`
  # profile. Lane C cannot share lane A's broker: the SyncEngine's topic names
  # are the cross-service contract (`<table>.events`, no suffix knob by
  # design), so two lanes on one broker would consume each other's events.
  # Isolation mirrors lane B owning its NATS. External listener :9095;
  # Connect REST :8085.
  kafka-sqlserver:
    image: confluentinc/cp-kafka:7.6.1
    container_name: omnicore-qa-kafka-sqlserver
    profiles: ["sqlserver"]
    ports:
      - "9095:9095"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-sqlserver:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9095"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-sqlserver:9092,EXTERNAL://localhost:9095"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qx"
      # Pin the JVM heap (the Keycloak rationale): unbounded, the broker was
      # OOM-killed (137) under the full multi-lane bench.
      KAFKA_HEAP_OPTS: "-Xms192m -Xmx512m"
    mem_limit: 1g
    volumes:
      - kafka_sqlserver_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  connect-sqlserver:
    image: quay.io/debezium/connect:3.0.0.Final
    container_name: omnicore-qa-connect-sqlserver
    profiles: ["sqlserver"]
    depends_on:
      kafka-sqlserver:
        condition: service_healthy
    ports:
      - "8085:8083"
    environment:
      BOOTSTRAP_SERVERS: "kafka-sqlserver:9092"
      GROUP_ID: "omnicore-qa-connect-sqlserver"
      CONFIG_STORAGE_TOPIC: "connect_sqlserver_configs"
      OFFSET_STORAGE_TOPIC: "connect_sqlserver_offsets"
      STATUS_STORAGE_TOPIC: "connect_sqlserver_statuses"
      KEY_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
      VALUE_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
      # Pin the JVM heap (the Keycloak rationale; twin of connect-oracle).
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx640m"
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ── Lane D relational — Oracle Free 23ai (gvenzl, ARM64-native) under the
  # `oracle` compose profile so `up -d` without the profile changes nothing for
  # the other lanes. The image creates the `omnicore` app user in FREEPDB1 on
  # first boot; the init script grants it EXECUTE ON DBMS_LOCK (the framework's
  # rebuild/migration lock — not a default grant) + SELECT_CATALOG_ROLE (the
  # lock-holder diagnostic). Floor: the framework's oracle engine requires
  # Oracle Database 23ai+ (native BOOLEAN/JSON).
  oracle:
    # PINNED to a 23ai Release Update on purpose (not the floating :23): newer
    # builds ship the 23.26+ rebrand whose banner reads "Oracle AI Database
    # 26ai Free" — Debezium's Oracle version parser (3.0 AND 3.3) expects the
    # "Oracle Database …" prefix and fails connector validation with "Failed
    # to resolve Oracle database version". 23.5 is squarely on the framework's
    # 23ai floor.
    image: gvenzl/oracle-free:23.5
    container_name: omnicore-qa-oracle
    profiles: ["oracle"]
    ports:
      - "15211:1521"
    environment:
      ORACLE_PASSWORD: "OmnicoreQA!2026"
      APP_USER: "omnicore"
      APP_USER_PASSWORD: "omnicore"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./oracle/init:/container-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30

  # Lane D Redis (same rationale as the other per-lane brokers).
  redis-oracle:
    image: redis:7-alpine
    container_name: omnicore-qa-redis-oracle
    profiles: ["oracle"]
    ports:
      - "6383:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Lane D transport — its OWN NATS JetStream + a Debezium SERVER relay
  # (Oracle → NATS), both under the `oracle` profile. Own NATS for the lane-C
  # reason: subject names are the cross-service contract
  # (omnicore.<table>.events, no suffix knob by design), so sharing lane B's
  # JetStream would cross the lanes' event streams. The relay is Debezium
  # Server (static config in ./debezium/conf-oracle-nats, no REST API) — the
  # lane-B pattern; register-connector.sh recreates it and waits for
  # streaming. App on the host connects at localhost:4242.
  nats-oracle:
    image: nats:2.10-alpine
    container_name: omnicore-qa-nats-oracle
    profiles: ["oracle"]
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4242:4222"
      - "8242:8222"
    volumes:
      - nats_oracle_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  debezium-server-oracle:
    image: quay.io/debezium/server:3.6.0.Final
    container_name: omnicore-qa-debezium-oracle
    profiles: ["oracle"]
    depends_on:
      nats-oracle:
        condition: service_healthy
    mem_limit: 1g
    volumes:
      - ./debezium/conf-oracle-nats:/debezium/config:ro
      - debezium_oracle_data:/debezium/data

  mysql:
    image: mysql:8.4
    container_name: omnicore-qa-mysql
    ports:
      - "3317:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: omnicore
      MYSQL_PASSWORD: omnicore
      MYSQL_DATABASE: users_db
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uomnicore -pomnicore --silent"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ── Shared read side — one Mongo, one DB per lane (users_views / _mysql) ────
  mongo:
    image: mongo:7
    container_name: omnicore-qa-mongo
    ports:
      - "27028:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Lane A broker — single-broker Kafka in KRaft mode (no Zookeeper) ────────
  # Two listeners: PLAINTEXT (kafka:9092) for in-network services (Debezium
  # Connect), EXTERNAL (localhost:9094) for the Go app on the host.
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: omnicore-qa-kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      # Pin the JVM heap (the Keycloak rationale; twin of kafka-sqlserver):
      # unbounded, the broker idles near 900MiB and the 4-lane bench total
      # tips the Docker VM into global OOM (which kills the fattest neighbor).
      KAFKA_HEAP_OPTS: "-Xms192m -Xmx512m"
    mem_limit: 1g
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Lane A relay — Kafka Connect runtime with Debezium plugins. The outbox +
  # qa-integration connectors are registered post-boot via REST (:8083) by
  # devops/debezium/register-connector.sh postgres — see the *-connector.json.
  connect:
    image: quay.io/debezium/connect:3.0.0.Final
    container_name: omnicore-qa-connect
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: "kafka:9092"
      GROUP_ID: "omnicore-connect"
      CONFIG_STORAGE_TOPIC: "omnicore_connect_configs"
      OFFSET_STORAGE_TOPIC: "omnicore_connect_offsets"
      STATUS_STORAGE_TOPIC: "omnicore_connect_statuses"
      KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      # Pin the JVM heap (the Keycloak rationale; twin of connect-sqlserver).
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx640m"
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Lane B broker — NATS with JetStream (file-backed, survives a restart) ───
  # App on the host connects at localhost:4232; in-network services (Debezium
  # Server relay) use nats:4222.
  nats:
    image: nats:2.10-alpine
    container_name: omnicore-qa-nats
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4232:4222"
      - "8232:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Lane B relay — Debezium Server (Quarkus). ONE instance tails BOTH MySQL
  # outbox tables (users_db.outbox + users_db.integration_events) via two
  # predicate-gated EventRouter transforms and sinks to NATS JetStream. Static
  # config, no REST API; the framework owns the JetStream stream (created
  # file-backed at app boot), so this relay publishes into it.
  debezium-server:
    image: quay.io/debezium/server:3.6.0.Final
    container_name: omnicore-qa-debezium
    depends_on:
      nats:
        condition: service_healthy
    # Same bound as debezium-server-oracle: a breach dies here, deterministically.
    mem_limit: 1g
    volumes:
      - ./debezium/conf-mysql-nats:/debezium/config:ro
      - debezium_data:/debezium/data

  # ── Shared — Keycloak IdP for the JWT auth profiles + qa/auth.sh/authz.sh ───
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: omnicore-qa-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      # Pin the JVM heap. Without this, Keycloak sizes the heap by
      # MaxRAMPercentage; with no container memory limit that percentage is taken
      # against the WHOLE Docker VM (~8 GB here), so under the two-lane matrix's
      # peak load Keycloak was host-OOM-killed (Exited 137) and `auth` went RED
      # for a non-code reason. A fixed heap + the mem_limit below bound it
      # deterministically (heap 640m max, well under the 1g cap for metaspace/
      # threads/direct buffers).
      JAVA_OPTS_KC_HEAP: "-Xms256m -Xmx640m"
    mem_limit: 1g
    ports:
      - "8088:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

  # ── Per-lane Redis for qa/cache.sh — one per lane (:6380 lane A, :6381 lane B)
  # so cache.sh can stop/start ITS broker to exercise failOpen without knocking
  # out the other lane running the same suite in parallel. ──────────────────
  redis:
    image: redis:7-alpine
    container_name: omnicore-qa-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-mysql:
    image: redis:7-alpine
    container_name: omnicore-qa-redis-mysql
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Shared — Jaeger all-in-one for qa/tracing.sh (OTLP gRPC 4317) ──────────
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: omnicore-qa-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      # The default in-memory span store is UNBOUNDED — observed >1GiB after a
      # few matrix runs, prime target of the VM-wide OOM killer. QA only ever
      # queries recent traces (tracing.sh), so cap the store and the container.
      MEMORY_MAX_TRACES: "10000"
    mem_limit: 768m
    ports:
      - "16686:16686"   # web UI
      - "4317:4317"     # OTLP gRPC — the app on the host exports here
      - "4318:4318"     # OTLP HTTP

  # ── Shared — Logging stack (ELK), under the `elk` compose profile: OFF by
  # default (no suite depends on it — a dev convenience for browsing the
  # mirrored app logs in Kibana :5601). Everything stays defined here; opt in
  # with `--profile elk up -d`. Keeping it down by default frees ~1.6 GiB of
  # the Docker VM — the headroom the sqlserver + oracle lanes need to run
  # locally side by side. ─────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: omnicore-qa-elasticsearch
    profiles: ["elk"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: omnicore-qa-kibana
    profiles: ["elk"]
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
    ports:
      - "5601:5601"

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.4
    container_name: omnicore-qa-filebeat
    profiles: ["elk"]
    user: root
    depends_on:
      - elasticsearch
    command: ["filebeat", "-e", "--strict.perms=false"]
    volumes:
      - ./elk/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./elk/logs:/logs:ro

volumes:
  postgres_data:
  sqlserver_data:
  kafka_sqlserver_data:
  oracle_data:
  nats_oracle_data:
  debezium_oracle_data:
  mysql_data:
  mongo_data:
  kafka_data:
  nats_data:
  debezium_data:
