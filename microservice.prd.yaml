service: omnicore-example-users

http:
  addr: "${HTTP_ADDR::8080}"

postgres:
  dsn: "${DATABASE_URL:postgres://omnicore:omnicore@localhost:5433/users_db?sslmode=disable}"

mongo:
  uri: "${MONGO_URI:mongodb://localhost:27018}"
  database: "${MONGO_DB:users_views}"
  # autoRun: true is the sandbox posture so QA suites can boot under prd
  # without the strict-mode drift abort. The profile-aware default in non-dev
  # profiles is check — real services running this profile against production
  # Mongo would either keep autoRun: true (auto-rebuild on deploy) or omit
  # the field entirely (operator runs the rebuild manually before redeploy).
  rebuild:
    autoRun: true

kafka:
  brokers:
    - "${KAFKA_BROKERS:localhost:9094}"
  syncGroupId: "${SYNC_GROUP_ID:omnicore-example-users-sync}"

migrations:
  dir: ./migrations
  autoRun: true

# Canonical prd profile. JWT validated locally against the IdP's JWKS endpoint —
# the most common production setup (low latency, key rotation honored on kid miss,
# no per-request IdP round-trip). The sibling profiles prd-pem.yaml,
# prd-external.yaml and prd-external-cached.yaml exercise the remaining modes of
# the framework's auth middleware and live next to this file so qa/auth.sh can
# select them via APP_PROFILE swap.
auth:
  mode: jwt
  jwt:
    algorithms: [RS256]
    issuer: "${JWT_ISSUER:http://localhost:8088/realms/omnicore-test}"
    audience: "${JWT_AUDIENCE:omnicore-users-api}"
    leewaySeconds: 5
    jwksUrl: "${JWT_JWKS_URL:http://localhost:8088/realms/omnicore-test/protocol/openid-connect/certs}"
  publicRoutes:
    - GET /health
  auditClaims:
    - preferred_username
    - email

# Audit destinations — production posture. Database guarantees the row is
# atomic with the data write (source of truth for compliance); slog feeds
# the operator's observability stack (ELK / Loki) as a read-side echo. Both
# active is the framework default; declared explicitly here so the production
# yaml carries no hidden assumptions about audit routing.
audit:
  destinations:
    - slog
    - database
