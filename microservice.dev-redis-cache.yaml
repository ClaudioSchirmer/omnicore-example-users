service: omnicore-example-users

# Variant of microservice.dev.yaml that swaps the httpclient cache backend
# from in-process memory to the framework's Redis adapter. Used exclusively
# by qa/httpclient-redis.sh — the regular dev workflow continues to point at
# microservice.dev.yaml.
#
# Diff against microservice.dev.yaml is intentionally minimal: ONLY the
# `httpClient.defaults.cache` block declares `store: redis` plus the matching
# `redis:` sub-block. Every other section (postgres, mongo, kafka, auth,
# audit, integration, shutdown, services, authProviders) is identical so the
# behavior verified by qa/httpclient.sh under `dev` keeps applying under
# `dev-redis-cache` — only the cache backend swaps underneath.
#
# Boot with: APP_PROFILE=dev-redis-cache go run ./bootstrap
# Prereq:    docker compose -f devops/docker-compose.yml up -d redis

http:
  addr: "${HTTP_ADDR::8080}"

postgres:
  dsn: "${DATABASE_URL:postgres://omnicore:omnicore@localhost:5433/users_db?sslmode=disable}"

mongo:
  uri: "${MONGO_URI:mongodb://localhost:27018}"
  database: "${MONGO_DB:users_views}"
  rebuild:
    autoRun: true
    allowDowngrade: false

kafka:
  brokers:
    - "${KAFKA_BROKERS:localhost:9094}"
  syncGroupId: "${SYNC_GROUP_ID:omnicore-example-users-sync}"

migrations:
  dir: ./migrations
  autoRun: true

query:
  maxLimit: 100

openapi:
  uiPath: /docs
  rootRedirect: true

auth:
  mode: disabled
  auditClaims: []

audit:
  destinations:
    - slog
    - database

httpClient:
  defaults:
    timeout: 10s
    headers:
      User-Agent: "omnicore-example-users/1.0"
    cache:
      enabled: true
      defaultTTL: 5m
      honorCacheControl: false
      # The only structural delta from microservice.dev.yaml — the cache
      # backend is Redis instead of in-process memory. The framework picks
      # the implementation here at New(): "redis" + the redis: sub-block
      # below builds the go-redis-backed adapter; everything downstream
      # (the cacheMiddleware, the cache key formula, varyOn, TTL, ...) is
      # unchanged.
      store: redis
      redis:
        addr: "${REDIS_ADDR:localhost:6380}"
        # KeyPrefix scopes every entry under one namespace so a Redis
        # shared across services (or environments) never produces a
        # cross-talk collision. The framework's key already starts with
        # the YAML service name as the first segment; the prefix is a
        # second namespace layer.
        keyPrefix: "${REDIS_KEY_PREFIX:omnicore-example-users-httpcache}"
        # FailMode "open" (the default) keeps the service responsive when
        # Redis is unreachable — every Get/Set against a down Redis logs
        # `slog.Warn "httpclient.cache.redis.transport.error"` and the
        # call proceeds to upstream as if the cache were disabled for
        # that request. qa/httpclient-redis.sh validates this behavior
        # explicitly (case 6).
        failMode: open
        timeoutMs: 100

  services:
    keycloak-public:
      baseURL: "${KC_URL:http://localhost:8088}"
      endpoints:
        getRealmInfo:
          method: GET
          path: /realms/omnicore-test/.well-known/openid-configuration
          cache: { ttl: 5m }

    keycloak-admin:
      baseURL: "${KC_URL:http://localhost:8088}"
      auth: { provider: kc-admin }
      endpoints:
        getUser:
          method: GET
          path: /admin/realms/omnicore-test/users/{id}
          acceptableStatus: [404]
          cache:
            ttl: 1m
            varyOn: [header:Accept-Language]

    keycloak-tenant:
      baseURL: "${KC_URL:http://localhost:8088}"
      auth: { provider: kc-password-tenant }
      endpoints:
        whoami:
          method: GET
          path: /realms/omnicore-test/protocol/openid-connect/userinfo

    echo:
      baseURL: "${ECHO_URL:http://localhost:8080}"
      endpoints:
        download:
          method: GET
          path: /echo/stream/{size}
          responseStream: true
        uploadStream:
          method: POST
          path: /echo/upload
        multipart:
          method: POST
          path: /echo/multipart
        sse:
          method: GET
          path: /echo/sse
          responseSSE: true

    echo-signed:
      baseURL: "${ECHO_URL:http://localhost:8080}"
      signing:
        type: hmac-sha256
        keyId: "${ECHO_KEY_ID:demo-key-1}"
        keyIdHeader: X-Key-Id
        secret: "${ECHO_SIGNING_SECRET:demo-secret-please-change}"
        signedHeaders:
          - host
          - x-date
          - x-content-sha256
        timestampHeader: X-Date
        timestampFormat: rfc1123
        signatureHeader: X-Signature
      endpoints:
        signed:
          method: POST
          path: /echo/signed

  authProviders:
    kc-admin:
      type: oauth2-client-credentials
      tokenEndpoint: "${KC_URL:http://localhost:8088}/realms/omnicore-test/protocol/openid-connect/token"
      clientId: "${KC_ADMIN_CLIENT_ID:omnicore-users-client}"
      clientSecret: "${KC_ADMIN_CLIENT_SECRET:test-secret-please-change}"
      tokenCache:
        source: response-field
        jsonPath: $.expires_in
        unit: seconds
        skew: 30s
      revocationOnUnauthorized: true

    kc-password-tenant:
      type: credentials-exchange
      tokenEndpoint: "${KC_URL:http://localhost:8088}/realms/omnicore-test/protocol/openid-connect/token"
      requestCodec: form-urlencoded
      requestFields:
        grant_type: password
        client_id: "${KC_TENANT_CLIENT_ID:omnicore-users-client}"
        client_secret: "${KC_TENANT_CLIENT_SECRET:test-secret-please-change}"
        scope: openid
      requestFieldsFromCtx:
        username: tenant.username
        password: tenant.password
      responseTokenPath: $.access_token
      tokenCache:
        source: response-field
        jsonPath: $.expires_in
        unit: seconds
        skew: 30s

integration:
  defaults:
    consumerGroup: "${INTEGRATION_GROUP_ID:omnicore-example-users-integration}"
    workers: 4
    startFrom: latest

shutdown:
  drainTimeoutSeconds: 30
